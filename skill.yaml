# Skill 元信息
name: face_alert_skill
version: 1.0.0
description: 人脸监控警报系统 - 检测到人脸靠近时捕获摄像头照片并发送微信通知

# 输入输出定义
inputs:
  - name: action
    type: string
    description: 操作类型 (start | stop | status | check_alert)
    required: false
    default: start
  
  - name: threshold
    type: integer
    description: 人脸面积阈值（触发警报的最小人脸面积）
    required: false
    default: 15000
  
  - name: wechat_receiver
    type: string
    description: 微信接收者（QClaw 管家 ID 或用户名）
    required: false
    default: qclaw_butler

outputs:
  - name: status
    type: string
    description: 执行状态 (success | failed | already_running | not_running)
  
  - name: image_path
    type: string
    description: 摄像头照片保存路径（绝对路径，用于返回给 QClaw）
  
  - name: image_url
    type: string
    description: 图片 URL（如果 QClaw 提供 HTTP 访问）
  
  - name: message
    type: string
    description: 返回给用户的消息
  
  - name: is_monitoring
    type: boolean
    description: 监控是否正在运行
  
  - name: alert_count
    type: integer
    description: 累计触发警报次数
  
  - name: message_sent
    type: boolean
    description: 是否已发送微信消息

# 技能标签
tags:
  - face-detection
  - camera-capture
  - wechat-notification
  - security-alert

# 作者信息
author: FishGuard Team
license: MIT

# 配置说明
config:
  # 监控配置
  monitor:
    camera_index: 0                    # 摄像头索引
    check_interval: 0.1                # 检查间隔（秒）
    debounce_time: 5.0                 # 防抖时间（秒）
  
  # 人脸检测配置
  face_detection:
    cascade_path: haarcascade_frontalface_default.xml
    scale_factor: 1.1
    min_neighbors: 5
    min_face_area: 15000               # 触发警报的最小人脸面积
  
  # 摄像头照片配置
  camera_capture:
    save_dir: ./screenshots            # 照片保存目录
    filename_format: alert_{timestamp}.png
    draw_face_box: true                # 是否绘制人脸框
    add_timestamp: true                # 是否添加时间戳
  
  # QClaw 集成配置
  qclaw:
    api_endpoint: http://localhost:8080/api/send_message
    message_template: |
      🚨 人脸监控警报
      时间: {timestamp}
      人脸数量: {face_count}
      摄像头照片已保存: {screenshot_path}
    timeout: 10                        # 请求超时（秒）
